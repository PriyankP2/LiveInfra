<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 580" width="1300" height="580" style="background:#0a0e1a">
  <defs>
    <marker id="rca1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#10b981"/></marker>
    <pattern id="d5" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#1f2937" opacity="0.4"/></pattern>
    <filter id="glow3"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1300" height="580" fill="#0a0e1a"/>
  <rect width="1300" height="580" fill="url(#d5)"/>

  <text x="650" y="36" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle">AI-RCA Pipeline</text>
  <text x="650" y="56" fill="#64748b" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">From incident webhook to streaming root cause analysis · Target: &lt;8 seconds end-to-end</text>

  <!-- Step boxes -->
  <!-- 1: Incident trigger -->
  <rect x="20" y="80" width="150" height="390" rx="8" fill="#111827" stroke="#f97316" stroke-width="1.5"/>
  <rect x="20" y="80" width="150" height="32" rx="8" fill="#431407"/>
  <text x="95" y="100" fill="#fb923c" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">① TRIGGER</text>
  <text x="95" y="128" fill="#fed7aa" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">Incident Arrives</text>
  <text x="95" y="148" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">PagerDuty webhook</text>
  <text x="95" y="164" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">OpsGenie webhook</text>
  <text x="95" y="180" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">CloudWatch alarm</text>
  <text x="95" y="196" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Manual trigger</text>
  <line x1="80" y1="218" x2="138" y2="218" stroke="#374151" stroke-width="1"/>
  <text x="95" y="238" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Validate sig</text>
  <text x="95" y="254" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Parse payload</text>
  <text x="95" y="270" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Extract resource</text>
  <text x="95" y="286" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">ARN / hostname</text>
  <text x="95" y="318" fill="#f97316" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-style="italic">Fuzzy-match</text>
  <text x="95" y="330" fill="#f97316" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-style="italic">resolver for</text>
  <text x="95" y="342" fill="#f97316" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-style="italic">partial ARNs</text>
  <text x="95" y="438" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">~0.1s</text>

  <!-- Arrow -->
  <line x1="172" y1="275" x2="205" y2="275" stroke="#10b981" stroke-width="2" marker-end="url(#rca1)"/>

  <!-- 2: Graph context fetch -->
  <rect x="208" y="80" width="160" height="390" rx="8" fill="#111827" stroke="#10b981" stroke-width="1.5"/>
  <rect x="208" y="80" width="160" height="32" rx="8" fill="#064e3b"/>
  <text x="288" y="100" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">② GRAPH CTX</text>
  <text x="288" y="128" fill="#a7f3d0" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">Neo4j Query</text>
  <text x="288" y="148" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Failing resource node</text>
  <text x="288" y="164" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">3-hop neighbors</text>
  <text x="288" y="180" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">(both directions)</text>
  <text x="288" y="196" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Edge metadata</text>
  <text x="288" y="212" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Traffic volumes</text>
  <text x="288" y="228" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Edge health status</text>
  <line x1="220" y1="248" x2="356" y2="248" stroke="#374151" stroke-width="1"/>
  <text x="288" y="268" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Blast radius</text>
  <text x="288" y="284" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">traversal result</text>
  <text x="288" y="300" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Severity scores</text>
  <text x="288" y="316" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Owner tags</text>
  <text x="288" y="438" fill="#10b981" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">~0.1s (&lt;100ms)</text>

  <line x1="370" y1="275" x2="403" y2="275" stroke="#10b981" stroke-width="2" marker-end="url(#rca1)"/>

  <!-- 3: Temporal context -->
  <rect x="406" y="80" width="160" height="390" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="406" y="80" width="160" height="32" rx="8" fill="#1e3a5f"/>
  <text x="486" y="100" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">③ TEMPORAL CTX</text>
  <text x="486" y="128" fill="#bfdbfe" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">PostgreSQL Queries</text>
  <text x="486" y="148" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">CloudTrail events</text>
  <text x="486" y="164" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Last 24h for all</text>
  <text x="486" y="180" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">blast radius nodes</text>
  <text x="486" y="196" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Alert history</text>
  <text x="486" y="212" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Last 7 days</text>
  <text x="486" y="228" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Deployment events</text>
  <line x1="418" y1="248" x2="554" y2="248" stroke="#374151" stroke-width="1"/>
  <text x="486" y="268" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Flow log anomalies</text>
  <text x="486" y="284" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">from Upstash cache</text>
  <text x="486" y="300" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Reject spike %</text>
  <text x="486" y="316" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Traffic anomalies</text>
  <text x="486" y="438" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">~0.3s</text>

  <line x1="568" y1="275" x2="601" y2="275" stroke="#10b981" stroke-width="2" marker-end="url(#rca1)"/>

  <!-- 4: Prompt build -->
  <rect x="604" y="80" width="160" height="390" rx="8" fill="#111827" stroke="#c084fc" stroke-width="1.5"/>
  <rect x="604" y="80" width="160" height="32" rx="8" fill="#2e1065"/>
  <text x="684" y="100" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">④ PROMPT BUILD</text>
  <text x="684" y="128" fill="#d8b4fe" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">Context Assembly</text>
  <text x="684" y="148" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Structured XML</text>
  <text x="684" y="164" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">&lt;resource_graph&gt;</text>
  <text x="684" y="180" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">&lt;alert_context&gt;</text>
  <text x="684" y="196" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">&lt;recent_changes&gt;</text>
  <text x="684" y="212" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">&lt;flow_anomalies&gt;</text>
  <line x1="616" y1="232" x2="752" y2="232" stroke="#374151" stroke-width="1"/>
  <text x="684" y="252" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">~4,000–8,000</text>
  <text x="684" y="268" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">input tokens</text>
  <text x="684" y="300" fill="#c084fc" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-style="italic">System prompt</text>
  <text x="684" y="316" fill="#c084fc" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-style="italic">cached via API</text>
  <text x="684" y="332" fill="#c084fc" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-style="italic">prompt caching</text>
  <text x="684" y="438" fill="#c084fc" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">~0.1s</text>

  <line x1="766" y1="275" x2="799" y2="275" stroke="#10b981" stroke-width="2" marker-end="url(#rca1)"/>

  <!-- 5: Claude API -->
  <rect x="802" y="80" width="165" height="390" rx="8" fill="#111827" stroke="#10b981" stroke-width="2" filter="url(#glow3)"/>
  <rect x="802" y="80" width="165" height="32" rx="8" fill="#064e3b"/>
  <text x="884" y="100" fill="#10b981" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">⑤ CLAUDE API</text>
  <text x="884" y="128" fill="#a7f3d0" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">claude-sonnet-4-6</text>
  <text x="884" y="148" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">stream: true</text>
  <text x="884" y="164" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">max_tokens: 2048</text>
  <text x="884" y="180" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">JSON schema output</text>
  <line x1="814" y1="200" x2="955" y2="200" stroke="#374151" stroke-width="1"/>
  <text x="884" y="218" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Output schema:</text>
  <text x="884" y="234" fill="#64748b" font-family="monospace,sans-serif" font-size="9" text-anchor="middle">root_cause: string</text>
  <text x="884" y="248" fill="#64748b" font-family="monospace,sans-serif" font-size="9" text-anchor="middle">confidence: h|m|l</text>
  <text x="884" y="262" fill="#64748b" font-family="monospace,sans-serif" font-size="9" text-anchor="middle">evidence: string[]</text>
  <text x="884" y="276" fill="#64748b" font-family="monospace,sans-serif" font-size="9" text-anchor="middle">what_i_dont_know</text>
  <text x="884" y="290" fill="#64748b" font-family="monospace,sans-serif" font-size="9" text-anchor="middle">remediation: steps[]</text>
  <text x="884" y="304" fill="#64748b" font-family="monospace,sans-serif" font-size="9" text-anchor="middle">severity: 1-5</text>
  <text x="884" y="324" fill="#10b981" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-style="italic">Prompt caching on</text>
  <text x="884" y="338" fill="#10b981" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-style="italic">system prompt saves</text>
  <text x="884" y="352" fill="#10b981" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-style="italic">~60% input cost</text>
  <text x="884" y="372" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">~$0.01–0.03/call</text>
  <text x="884" y="438" fill="#10b981" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">2–4 seconds</text>

  <line x1="969" y1="275" x2="1002" y2="275" stroke="#10b981" stroke-width="2" marker-end="url(#rca1)"/>

  <!-- 6: Streaming to UI -->
  <rect x="1005" y="80" width="160" height="390" rx="8" fill="#111827" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="1005" y="80" width="160" height="32" rx="8" fill="#1c0f00"/>
  <text x="1085" y="100" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">⑥ STREAM → UI</text>
  <text x="1085" y="128" fill="#fde68a" font-family="system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle">Token Streaming</text>
  <text x="1085" y="148" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Anthropic stream →</text>
  <text x="1085" y="164" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Supabase realtime</text>
  <text x="1085" y="180" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">→ WebSocket push</text>
  <text x="1085" y="196" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">→ React renders</text>
  <line x1="1017" y1="216" x2="1153" y2="216" stroke="#374151" stroke-width="1"/>
  <text x="1085" y="236" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">RCA panel slides in</text>
  <text x="1085" y="252" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">alongside graph</text>
  <text x="1085" y="268" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Token-by-token</text>
  <text x="1085" y="284" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">typing animation</text>
  <text x="1085" y="308" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-style="italic">Evidence items</text>
  <text x="1085" y="322" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-style="italic">clickable → raw</text>
  <text x="1085" y="336" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-style="italic">CloudTrail JSON</text>
  <text x="1085" y="360" fill="#fde68a" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Persisted to PG</text>
  <text x="1085" y="374" fill="#fde68a" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">rca_outputs table</text>
  <text x="1085" y="438" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">~3–4s (streaming)</text>

  <!-- 7: Engineer sees -->
  <rect x="1185" y="200" width="95" height="170" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1232" y="220" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle">ENGINEER</text>
  <text x="1232" y="238" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle">SEES</text>
  <circle cx="1232" cy="268" r="16" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="1232" y="273" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">✓</text>
  <text x="1232" y="304" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Root cause</text>
  <text x="1232" y="318" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Evidence</text>
  <text x="1232" y="332" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Fix steps</text>
  <text x="1232" y="346" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Blast radius</text>

  <line x1="1167" y1="275" x2="1183" y2="275" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#rca1)"/>

  <!-- Total timing bar -->
  <rect x="20" y="490" width="1260" height="50" rx="6" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="40" y="512" fill="#64748b" font-family="system-ui,sans-serif" font-size="11" font-weight="700">TOTAL:</text>
  <text x="100" y="512" fill="#10b981" font-family="system-ui,sans-serif" font-size="11" font-weight="600">&lt;8 seconds end-to-end</text>
  <text x="290" y="512" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">= Trigger 0.1s + Graph 0.1s + Temporal 0.3s + Prompt 0.1s + Claude 2–4s + Streaming 3–4s</text>
  <text x="40" y="530" fill="#64748b" font-family="system-ui,sans-serif" font-size="11" font-weight="700">COST:</text>
  <text x="100" y="530" fill="#10b981" font-family="system-ui,sans-serif" font-size="11">~$0.01–0.03 per RCA call · Do NOT gate AI features at MVP — cost is negligible</text>

  <!-- AI reliability note -->
  <rect x="20" y="548" width="1260" height="22" rx="4" fill="#0f2a1a" stroke="#10b981" stroke-width="1"/>
  <text x="40" y="563" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="11">★ Transparency rule: every RCA output must include evidence[], confidence level with honest uncertainty, and "what_i_dont_know" section — SREs must be able to audit the AI's reasoning</text>
</svg>
