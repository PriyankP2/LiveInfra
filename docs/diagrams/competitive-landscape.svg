  <text x="550" y="56" fill="#64748b" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Price vs. Intelligence · The gap no one owns at mid-market</text>

  <!-- Chart area -->
  <rect x="100" y="80" width="750" height="560" rx="4" fill="#0d1117"/>

  <!-- Quadrant backgrounds -->
  <rect x="100" y="80" width="375" height="280" fill="#10b981" fill-opacity="0.03"/>
  <rect x="475" y="80" width="375" height="280" fill="#3b82f6" fill-opacity="0.05"/>
  <rect x="100" y="360" width="375" height="280" fill="#374151" fill-opacity="0.05"/>
  <rect x="475" y="360" width="375" height="280" fill="#ef4444" fill-opacity="0.04"/>

  <!-- Quadrant labels (faint) -->
  <text x="200" y="200" fill="#1f2937" font-family="system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle" transform="rotate(-15,200,200)">Budget Blind</text>
  <text x="650" y="175" fill="#1f2937" font-family="system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle" transform="rotate(-15,650,175)">Enterprise Premium</text>
  <text x="200" y="480" fill="#1f2937" font-family="system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle" transform="rotate(-15,200,480)">Diagram Tools</text>
  <text x="650" y="480" fill="#1f2937" font-family="system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle" transform="rotate(-15,650,480)">THE GAP ★</text>

