  <!-- ══ COMPETITORS ══ -->
  <!-- CloudMapper - free, dead, static - low price, low intel -->
  <circle cx="170" cy="560" r="22" fill="#1c1917" stroke="#78716c" stroke-width="1.5"/>
  <text x="170" y="556" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" font-weight="600" text-anchor="middle">Cloud</text>
  <text x="170" y="568" fill="#78716c" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Mapper</text>
  <text x="170" y="596" fill="#475569" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Free · Abandoned</text>
  <text x="170" y="608" fill="#475569" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Zero AI</text>

  <!-- Steampipe - free, SQL only -->
