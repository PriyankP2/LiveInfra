  <line x1="850" y1="640" x2="844" y2="634" stroke="#374151" stroke-width="2"/>
  <line x1="850" y1="640" x2="844" y2="646" stroke="#374151" stroke-width="2"/>
  <text x="475" y="672" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" font-weight="600">Price / Budget Accessibility →</text>
