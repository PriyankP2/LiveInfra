  <text x="185" y="526" fill="#475569" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Free · SQL-only</text>
  <text x="185" y="538" fill="#475569" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">No visualization</text>

