  <text x="200" y="287" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10" font-weight="600" text-anchor="middle">Back</text>
  <text x="200" y="299" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">stage</text>
  <text x="200" y="327" fill="#475569" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">OSS · Manual YAML</text>
