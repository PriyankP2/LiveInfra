<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 620" width="1300" height="620" style="background:#0a0e1a">
  <defs>
    <pattern id="d6" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#1f2937" opacity="0.4"/></pattern>
    <filter id="glow4"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1300" height="620" fill="#0a0e1a"/>
  <rect width="1300" height="620" fill="url(#d6)"/>

  <!-- Title -->
  <text x="650" y="36" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle">LiveInfra — Product Roadmap</text>
  <text x="650" y="56" fill="#64748b" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle">Solo founder · ~2h/day · Building in public · First paying customer by Month 7</text>

  <!-- Timeline spine -->
  <line x1="60" y1="120" x2="1250" y2="120" stroke="#1f2937" stroke-width="3"/>

