  <text x="440" y="548" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Multi-account (AWS Organizations)</text>
  <text x="440" y="563" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Infra DVR (S3 Parquet + DuckDB diffs)</text>
  <text x="650" y="548" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Drift detection vs Terraform state</text>
  <text x="650" y="563" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Slack integration · AWS Marketplace</text>
