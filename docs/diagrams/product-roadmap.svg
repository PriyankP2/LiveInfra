    <text x="12" y="116" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Orphaned resource cleanup flows</text>
    <text x="12" y="132" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Cost attribution per dependency chain</text>
