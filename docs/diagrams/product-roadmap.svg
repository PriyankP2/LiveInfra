    <text x="12" y="200" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="10">SRE diagnoses a real incident faster with</text>
    <text x="12" y="216" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="10">LiveInfra → one testimonial quote</text>
