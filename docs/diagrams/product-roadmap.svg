    <text x="12" y="68" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ AI RCA: Claude API + streaming display</text>
    <text x="12" y="84" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Evidence list (clickable raw CloudTrail)</text>
    <text x="12" y="100" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ CloudWatch + PagerDuty integration</text>
    <text x="12" y="116" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Auto-RCA on incident detection</text>
    <text x="12" y="132" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Incident feed with Supabase realtime</text>
    <text x="12" y="148" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ 4-step onboarding wizard</text>
    <text x="12" y="164" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Landing page + Stripe subscriptions</text>
