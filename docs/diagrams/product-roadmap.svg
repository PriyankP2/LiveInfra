    <text x="12" y="200" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ EKS/Kubernetes topology overlay</text>
    <text x="12" y="216" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ EventBridge cross-account routing</text>
