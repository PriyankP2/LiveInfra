  <circle cx="100" cy="120" r="14" fill="#374151" stroke="#f1f5f9" stroke-width="2"/>
  <text x="100" y="125" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle">NOW</text>

  <circle cx="400" cy="120" r="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2.5" filter="url(#glow4)"/>
  <text x="400" y="124" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle">M3</text>

  <circle cx="650" cy="120" r="16" fill="#0f2a1a" stroke="#10b981" stroke-width="2.5" filter="url(#glow4)"/>
  <text x="650" y="124" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle">M6</text>

  <circle cx="940" cy="120" r="16" fill="#2e1065" stroke="#c084fc" stroke-width="2.5" filter="url(#glow4)"/>
  <text x="940" y="124" fill="#d8b4fe" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle">M12</text>

  <circle cx="1220" cy="120" r="16" fill="#1c0f00" stroke="#f59e0b" stroke-width="2.5" filter="url(#glow4)"/>
  <text x="1220" y="124" fill="#fde68a" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Y2</text>

  <!-- Month markers -->
  <text x="100" y="148" fill="#475569" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Month 0</text>
  <text x="400" y="148" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-weight="600">Month 3</text>
  <text x="650" y="148" fill="#10b981" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-weight="600">Month 6</text>
  <text x="940" y="148" fill="#c084fc" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-weight="600">Month 12</text>
  <text x="1220" y="148" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-weight="600">Year 2</text>

