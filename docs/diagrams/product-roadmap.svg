  <text x="90" y="186" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Phase 1 — MVP</text>
  <text x="622" y="186" fill="#64748b" font-family="system-ui,sans-serif" font-size="12" text-anchor="end">Months 1–3 · ~70 working days · 2h/day</text>

  <text x="80" y="218" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Goal: First paying customer before Month 4</text>

