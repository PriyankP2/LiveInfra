    <text x="12" y="116" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ SLA with uptime guarantee</text>
    <text x="12" y="132" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Dedicated Slack support</text>
    <text x="12" y="152" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="0.5">SECURITY FEATURES</text>
    <text x="12" y="168" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Topology-aware Security Hub</text>
    <text x="12" y="184" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ IAM trust chain visualization</text>
    <text x="12" y="200" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ KMS key blast radius</text>
