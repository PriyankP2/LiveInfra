    <text x="12" y="52" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Neo4j AuraDB + Upstash Redis wired</text>
    <text x="12" y="68" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ CloudFormation IAM role template</text>
    <text x="12" y="84" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ EC2, RDS, Lambda, ALB, SQS, S3 scanner</text>
    <text x="12" y="100" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ AWS Config relationship extractor</text>
    <text x="12" y="116" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Neo4j MERGE upsert layer</text>
    <text x="12" y="132" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Railway 15-min cron scan cycle</text>
    <text x="12" y="152" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="0.5">MILESTONE 2: GRAPH UI (day 30 target)</text>
    <text x="12" y="168" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Sigma.js WebGL graph with WebWorkers</text>
    <text x="12" y="184" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Node/edge color by type + health</text>
    <text x="12" y="200" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Pan, zoom, search, right panel</text>
    <text x="12" y="216" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">✦ Progressive loading (critical first)</text>
